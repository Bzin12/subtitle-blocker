<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 260px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      background: #1a1a1a;
      color: #ddd;
    }
    h3 { margin-bottom: 14px; font-size: 15px; color: #fff; }
    .row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .row label { width: 50px; flex-shrink: 0; }
    .row input[type="range"] { flex: 1; }
    .row .val { width: 32px; text-align: right; font-variant-numeric: tabular-nums; }
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      border-radius: 2px;
      background: #444;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #888;
      cursor: pointer;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
      background: #333;
      color: #ddd;
      margin-top: 14px;
    }
    .btn:hover { background: #444; }
    .btn.active { background: #c0392b; }
    .note { font-size: 11px; color: #777; margin-top: 10px; text-align: center; }
    .note.ok { color: #5a5; }
  </style>
</head>
<body>
  <h3>Subtitle Blocker</h3>
  <div class="row">
    <label>Width</label>
    <input type="range" id="width" min="100" max="1000" value="500">
    <span class="val" id="widthVal">500</span>
  </div>
  <div class="row">
    <label>Height</label>
    <input type="range" id="height" min="20" max="300" value="80">
    <span class="val" id="heightVal">80</span>
  </div>
  <button class="btn" id="toggle">Hide</button>
  <div class="note" id="status">No video detected</div>
  <script src="popup.js"></script>
</body>
</html>
